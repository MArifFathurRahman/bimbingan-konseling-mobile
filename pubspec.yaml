name: aplikasi_bk
description: "Binusa SafeSpace - BK Application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  pdf: ^3.11.0
  printing: ^5.13.4
  firebase_storage: ^12.4.4
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/images/binusa_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/binusa_logo.png
